name: Build and Release

on:
  release:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore LinkShield.slnx
      
    - name: Build and Publish
      run: |
        dotnet publish LinkShield.App -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
        
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./LinkShield-${{ github.event.release.tag_name }}-win-x64.zip

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/LinkShield.exe
          ./LinkShield-${{ github.event.release.tag_name }}-win-x64.zip
        token: ${{ github.token }}
