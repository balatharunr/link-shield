name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-and-upload:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore LinkShield.slnx
      
    - name: Build and Publish
      run: |
        dotnet publish LinkShield.App -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
        
    - name: Get release info
      id: get_release
      uses: actions/github-script@v7
      with:
        script: |
          const release = context.payload.release;
          return {
            upload_url: release.upload_url,
            tag_name: release.tag_name
          };
        result-encoding: json
        
    - name: Upload EXE Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ fromJson(steps.get_release.outputs.result).upload_url }}
        asset_path: ./publish/LinkShield.exe
        asset_name: LinkShield.exe
        asset_content_type: application/octet-stream
        
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./LinkShield-${{ fromJson(steps.get_release.outputs.result).tag_name }}-win-x64.zip
        
    - name: Upload ZIP Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ fromJson(steps.get_release.outputs.result).upload_url }}
        asset_path: ./LinkShield-${{ fromJson(steps.get_release.outputs.result).tag_name }}-win-x64.zip
        asset_name: LinkShield-${{ fromJson(steps.get_release.outputs.result).tag_name }}-win-x64.zip
        asset_content_type: application/zip
