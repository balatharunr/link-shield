name: Build and Release

on:
  push:
    branches:
      - main
      - master
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore dependencies
      run: dotnet restore LinkShield.slnx
      
    - name: Get version from csproj
      id: get_version
      shell: pwsh
      run: |
        [xml]$csproj = Get-Content LinkShield.App/LinkShield.App.csproj
        $version = $csproj.Project.PropertyGroup.Version
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"
        
    - name: Build and Publish
      run: |
        dotnet publish LinkShield.App -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish
        
    - name: Create ZIP archive
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/LinkShield.exe -DestinationPath ./LinkShield-v${{ steps.get_version.outputs.VERSION }}-win-x64.zip
        
    - name: Get latest tag
      id: get_tag
      shell: pwsh
      run: |
        $latestTag = git describe --tags --abbrev=0 2>$null
        if ($LASTEXITCODE -ne 0) {
          $latestTag = "v0.0.0"
        }
        echo "LATEST_TAG=$latestTag" >> $env:GITHUB_OUTPUT
        echo "Latest tag: $latestTag"
        
    - name: Create Release
      id: create_release
      uses: actions/github-script@v7
      env:
        VERSION: ${{ steps.get_version.outputs.VERSION }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const version = process.env.VERSION;
          const tag = `v${version}`;
          
          // Check if tag already exists
          let tagExists = false;
          try {
            await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`
            });
            tagExists = true;
            console.log(`Tag ${tag} already exists, skipping release creation`);
          } catch (error) {
            console.log(`Tag ${tag} does not exist, creating release`);
          }
          
          if (!tagExists) {
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `LinkShield ${tag}`,
              body: `## LinkShield ${tag}\n\n### What's New\n- Bug fixes and improvements\n- UI enhancements\n\n### Installation\nDownload \`LinkShield.exe\` and run it on Windows.\n\n### Requirements\n- Windows 10/11 (x64)\n- No .NET installation required (self-contained)`,
              draft: false,
              prerelease: false
            });
            
            core.setOutput('upload_url', release.data.upload_url);
            core.setOutput('created', 'true');
            return release.data.id;
          } else {
            core.setOutput('created', 'false');
          }
        
    - name: Upload EXE to Release
      if: steps.create_release.outputs.created == 'true'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./publish/LinkShield.exe
        asset_name: LinkShield.exe
        asset_content_type: application/octet-stream
        
    - name: Upload ZIP to Release
      if: steps.create_release.outputs.created == 'true'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./LinkShield-v${{ steps.get_version.outputs.VERSION }}-win-x64.zip
        asset_name: LinkShield-v${{ steps.get_version.outputs.VERSION }}-win-x64.zip
        asset_content_type: application/zip
